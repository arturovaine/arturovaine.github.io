<!-- Award Highlights -->
<section class="border-t border-white/5">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-16 md:py-24">
    <div>
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-2">
          <i data-lucide="award" class="w-5 h-5 text-emerald-400"></i>
          <h3 class="text-xl font-semibold tracking-tight">Award Highlights</h3>
        </div>
      </div>

      <div id="award-highlights-carousel" class="relative overflow-hidden border border-white/10 bg-neutral-900" style="border-radius: 15px;">
        <button id="carousel-prev" class="absolute left-4 top-1/2 -translate-y-1/2 z-10 btn btn-carousel" aria-label="Previous video">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <button id="carousel-next" class="absolute right-4 top-1/2 -translate-y-1/2 z-10 btn btn-carousel" aria-label="Next video">
          <i data-lucide="chevron-right" class="w-6 h-6"></i>
        </button>

        <div id="video-carousel" class="flex transition-transform duration-500 ease-in-out"></div>

        <div id="carousel-dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-2 z-10"></div>
      </div>
    </div>
  </div>
</section>
