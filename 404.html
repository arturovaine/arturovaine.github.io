<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Arturo Vaine</title>

  <meta name="theme-color" content="#0a0a0a">

      min-height: 100vh;
      display: flex;

      color: #e5e5e5;
      text-decoration: none;
